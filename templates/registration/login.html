{% extends "base.html" %}

{% block title %}Вход — Электронный журнал{% endblock %}

{% block content %}
<section class="auth-panel">
    <p class="eyebrow">Авторизация</p>
    <h1 class="page-title">Вход в систему</h1>
    {% if form.errors %}
        <p class="form-error">Неверное имя пользователя или пароль.</p>
    {% endif %}
    <form method="post" class="stacked-form">
        {% csrf_token %}
        <label for="{{ form.username.id_for_label }}">Имя пользователя</label>
        {{ form.username }}
        <label for="{{ form.password.id_for_label }}">Пароль</label>
        {{ form.password }}
        <button class="primary-action" type="submit">Войти</button>
    </form>
</section>
{% endblock %}
