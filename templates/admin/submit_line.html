{% load i18n admin_urls %}

<div class="submit-row">
    {% block submit-row %}
        {% if show_save_and_continue %}
            <input type="submit"
                   value="Сохранить"
                   class="default"
                   name="_continue">
        {% endif %}
        {% if show_save %}
            <input type="submit"
                   value="Сохранить и выйти"
                   name="_save">
        {% endif %}
    {% endblock %}
</div>
